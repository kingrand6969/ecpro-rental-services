services:
  - type: web
    name: ecpro-rental-services
    runtime: node
    plan: free
    # Deploy every push to main. Without this, commits sit on GitHub and the
    # live site keeps serving the previously built bundle.
    autoDeploy: true
    branch: main
    # --include=dev because Render sets NODE_ENV=production, which would
    # otherwise skip vite/esbuild/tsx — the tools the build itself needs.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.16.0
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
